name: MYK Build CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # KRİTİK: Android 16 SDK Lisanslarını Onayla
    - name: Accept Android SDK Licenses
      run: |
        echo "Searching for sdkmanager in $ANDROID_HOME/cmdline-tools..."
        SDKMANAGER=$(find $ANDROID_HOME/cmdline-tools -name "sdkmanager" -type f -executable | head -n 1)
        if [ -z "$SDKMANAGER" ]; then
          echo "Error: sdkmanager not found!"
          exit 1
        fi
        echo "Found sdkmanager at: $SDKMANAGER"
        yes | "$SDKMANAGER" --licenses

    # KRİTİK: SDK 36 Uyumluluk Ayarı ve Bellek Bariyeri
    - name: Prepare Gradle Properties
      run: |
        echo "android.suppressUnsupportedCompileSdk=36" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties
        echo "org.gradle.parallel=true" >> gradle.properties
        echo "org.gradle.configuration-cache=false" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties

    # KRİTİK: Dizin Kontrolü, Wrapper Üretimi ve İzin Ataması
    - name: Verify Workspace and Set Permissions
      run: |
        echo "--- Kök Dizin Yapısı ---"
        ls -la
        
        echo "--- App Klasörü Yapısı ---"
        ls -R app/ || echo "app klasörü bulunamadı!"
        
        # Eğer gradlew dosyası repoya eklenmemişse, setup-gradle'ın sağladığı global gradle ile anında üretelim
        if [ ! -f "./gradlew" ]; then
          echo "Uyarı: gradlew dosyası bulunamadı! Otomatik olarak oluşturuluyor..."
          gradle wrapper --gradle-version 8.10.2
        fi
        
        echo "gradlew dosyasına çalıştırma izni veriliyor..."
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon --no-configuration-cache

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: myk-build-station-debug
        path: app/build/outputs/apk/debug/*.apk
